name: CI and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests
        run: make test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build binaries
        run: |
          make build
          make build-arm64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: oc-companion-binaries
          path: |
            build/oc-companion
            build/oc-companion-linux-arm64

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: oc-companion-binaries
          path: build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/oc-companion
            build/oc-companion-linux-arm64
          generate_release_notes: true
